<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>たんば - 現世編 / 死後の世界編</title>
  <style>
    :root {
      --bg: #07070d;
      --panel: #111125;
      --line: #2dfdff;
      --text: #f4f6ff;
      --gold: #ffd84e;
      --violet: #8b42ff;
      --red: #ff4861;
      --blue: #36adff;
      --green: #52ff98;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: monospace;
      color: var(--text);
      background: radial-gradient(circle at 20% 0%, #20204d, #07070d 50%);
      overflow-x: hidden;
    }
    body.afterlife {
      background: radial-gradient(circle at 20% 0%, #47005f, #0a0212 45%, #000 100%);
    }
    .app { max-width: 430px; margin: 0 auto; min-height: 100vh; padding: 8px 8px 96px; }
    .panel { background: var(--panel); border: 2px solid var(--line); border-radius: 10px; padding: 10px; box-shadow: 0 0 14px #00f6ff44; }
    h1 { margin: 0 0 8px; font-size: 17px; color: #ffdbff; text-shadow: 0 0 8px #ff2bd6; }
    .status { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 12px; }
    .status b { color: #8fffca; }
    #progressBar { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; font-size: 10px; }
    .stageChip { border: 1px solid #3c5585; padding: 4px 6px; border-radius: 999px; background: #11192f; }
    .stageChip.active { color: #000; background: #00ffea; box-shadow: 0 0 10px #00ffea; font-weight: 700; }

    #board {
      position: relative; height: 500px; margin: 10px 0;
      border: 2px solid #fff; border-radius: 12px; overflow: hidden;
      background: repeating-radial-gradient(circle at 20% 30%, #ffffff22 0 1px, transparent 1px 8px),
                  linear-gradient(180deg, #172c6f, #0d0d26 60%, #050510);
    }
    body.afterlife #board {
      background: linear-gradient(180deg, #20103a, #49001d 35%, #160000 65%, #070014),
                  repeating-linear-gradient(45deg, #ffffff0f 0 20px, transparent 20px 42px);
    }
    .cell {
      position: absolute; width: 50px; height: 42px; border: 2px solid #000; border-radius: 8px;
      display: flex; flex-direction: column; justify-content: space-between; padding: 2px; font-size: 9px; font-weight: 700;
      box-shadow: 0 0 0 1px #fff3 inset;
    }
    .cell .tag { font-size: 8px; }
    .cell.start { background: #fff; color: #000; }
    .cell.event { background: #5ce7ff; color: #00111b; }
    .cell.tanba { background: #fff5b8; color: #312300; }
    .cell.fate { background: #d593ff; color: #120123; }
    .cell.goal { background: linear-gradient(135deg, #ffe14b, #ff4c8f); color: #1f000f; }
    .player { position: absolute; right: 1px; bottom: 0; font-size: 18px; text-shadow: 0 0 8px #fff; }

    .actionsFixed {
      position: fixed; left: 50%; transform: translateX(-50%); bottom: 0; width: min(430px, 100%);
      background: #060912ea; border-top: 2px solid #2dfdff; display: grid; grid-template-columns: 2fr 1fr; gap: 8px;
      padding: 8px; z-index: 50;
    }
    button { min-height: 44px; border: 0; border-radius: 10px; font-size: 16px; font-weight: 700; font-family: inherit; }
    #rollBtn { background: linear-gradient(135deg, #ff2dc8, #7f56ff); color: #fff; }
    #restartBtn { background: #36adff; color: #041224; }
    #log { margin-top: 8px; font-size: 12px; max-height: 140px; overflow: auto; white-space: pre-wrap; }

    .screen, .modal, .fx { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; padding: 12px; z-index: 80; }
    .screen.show, .modal.show, .fx.show { display: flex; }
    .screen { background: #000d; }
    .box { width: 100%; max-width: 390px; background: #070912; border: 2px solid var(--line); border-radius: 12px; padding: 14px; box-shadow: 0 0 20px #00f6ff44; }
    .creatures { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .creatureBtn { background: #140f30; color: #fff; border: 1px solid #7de6ff; }
    .modal { background: #000c; }
    .fx { background: #000d; animation: reverseFx .9s ease; }
    @keyframes reverseFx { 0% { filter: invert(0); } 40% { filter: invert(1) hue-rotate(180deg); } 100% { filter: invert(0);} }
    .silhouette { width: 130px; height: 180px; background: #000; border-radius: 58% 58% 38% 38%; position: relative; box-shadow: 0 0 30px #ffe882; margin: 0 auto; }
    .silhouette:before { content: ""; position: absolute; width: 68px; height: 68px; border-radius: 50%; background: #000; left: 31px; top: -38px; }
  </style>
</head>
<body>
  <div class="app">
    <section class="panel">
      <h1>輪廻すごろく たんば</h1>
      <div class="status" id="status"></div>
      <div id="progressBar"></div>
    </section>
    <section id="board"></section>
    <section class="panel"><div id="log"></div></section>
  </div>

  <div class="actionsFixed">
    <button id="rollBtn">🎲 サイコロを振る</button>
    <button id="restartBtn">⟲ リスタート</button>
  </div>

  <div class="screen show" id="startScreen"><div class="box"><h2>START</h2><p>現世で6段階の命を巡り、人間でゴールすると死後の世界へ進みます。</p><button id="startBtn">ゲーム開始</button></div></div>
  <div class="screen" id="creatureScreen"><div class="box"><h2>次の生命を選べ</h2><p id="creatureStage"></p><div class="creatures" id="creatureList"></div></div></div>
  <div class="modal" id="eventModal"><div class="box"><h3 id="eventTitle"></h3><p id="eventText"></p><button id="eventClose">閉じる</button></div></div>
  <div class="modal" id="tanbaModal"><div class="box"><div class="silhouette"></div><h3>丹波イベント</h3><p id="tanbaText"></p></div></div>
  <div class="fx" id="reverseFx"><div class="box"><h3>肉体の旅は終わった</h3><p>ここから先は、死後の世界である。</p></div></div>

<script>
const lifeStages = ['地を這うもの','水に住むもの','両生類','空を飛ぶもの','哺乳類','人間'];
const creatureOptions = {
  '地を這うもの': [{name:'ナマコ',icon:'🪱'},{name:'ゲジゲジ',icon:'🐛'},{name:'ミミズ',icon:'🪱'},{name:'ダンゴムシ',icon:'🐌'},{name:'ヤスデ',icon:'〰️'}],
  '水に住むもの': [{name:'フナ',icon:'🐟'},{name:'ミジンコ',icon:'🫧'},{name:'メダカ',icon:'🐠'},{name:'クラゲ',icon:'🪼'},{name:'ザリガニ',icon:'🦐'}],
  '両生類': [{name:'カエル',icon:'🐸'},{name:'イモリ',icon:'🦎'},{name:'サンショウウオ',icon:'∿'},{name:'アカハライモリ',icon:'🦎'},{name:'ウーパールーパー',icon:'◉'}],
  '空を飛ぶもの': [{name:'スズメ',icon:'🐦'},{name:'カラス',icon:'🐦‍⬛'},{name:'ハト',icon:'🕊️'},{name:'チョウ',icon:'🦋'},{name:'トンボ',icon:'✶'}],
  '哺乳類': [{name:'犬',icon:'🐕'},{name:'猫',icon:'🐈'},{name:'猿',icon:'🐒'},{name:'馬',icon:'🐎'},{name:'キツネ',icon:'🦊'}]
};
const livingWorldBoard = Array.from({length:24}, (_,i)=>({label: i===0?'始':i===23?'現世ゴール':'現世', type: i===0?'start':i===23?'goal':[5,9,14,18].includes(i)?'tanba':[3,7,11,16,21].includes(i)?'fate':'event'}));
const afterlifeNames = ['三途','精霊','幽界','回想','霊界','天界','地獄','一界','二界','神界'];
const afterlifeBoard = Array.from({length:50}, (_,i)=>({label: i===49?'最終ゴール': afterlifeNames[i%afterlifeNames.length], type: i===49?'goal':[6,12,20,28,40].includes(i)?'tanba':[9,15,24,33,45].includes(i)?'fate':'event'}));
const eventCards = {
  '地を這うもの':[{text:'靴音を察知して全力で横に逃げた。',v:5,s:0},{text:'乾いた地面で人生を考えた。',v:0,s:3},{text:'落ち葉の裏で一晩を越した。',v:4,s:0},{text:'なぜか人間に悲鳴を上げられた。',v:0,s:5}],
  '水に住むもの':[{text:'水面の光を見上げて、少し悟った。',v:6,s:0},{text:'大きな魚の影におびえた。',v:0,s:4},{text:'透明な水草に隠れて命をつないだ。',v:5,s:0},{text:'泡を出しただけで一日が終わった。',v:0,s:2}],
  '両生類':[{text:'雨の日に世界が広く見えた。',v:7,s:0},{text:'石の上で日向ぼっこをした。',v:5,s:0},{text:'ぬるっとした動きで人間を驚かせた。',v:0,s:5},{text:'池の主っぽい顔をした。',v:0,s:3}],
  '空を飛ぶもの':[{text:'電線から夕焼けを見た。',v:8,s:0},{text:'風を読んで空を渡った。',v:7,s:0},{text:'人の弁当を狙った。',v:0,s:8},{text:'窓ガラスに自分を敵だと思った。',v:0,s:6}],
  '哺乳類':[{text:'子どもに撫でられて優しい気持ちになった。',v:10,s:0},{text:'群れの仲間を守った。',v:12,s:0},{text:'エサを独り占めした。',v:0,s:10},{text:'何もしていないのに偉そうに座った。',v:0,s:5}],
  '人間':[{text:'落ちていた財布を交番に届けた。',v:15,s:0},{text:'電車で席を譲った。',v:10,s:0},{text:'ありがとうと言うタイミングを逃した。',v:0,s:5},{text:'人の話を聞いているふりをした。',v:0,s:8},{text:'まだ読んでいない本を読んだ顔で語った。',v:0,s:10}],
};
const afterlifeEvents = [{text:'三途の川で順番待ちをした。',v:5,s:0},{text:'霊界の受付で書類不備を指摘された。',v:0,s:8},{text:'精霊界でダンス審査が始まった。',v:15,s:10,branch:true},{text:'前世の記憶が水面に映った。',v:10,s:0},{text:'地獄の一丁目で道に迷った。',v:0,s:15},{text:'天界の村でお茶を出された。',v:20,s:0},{text:'生前の発言が霊界スクリーンに映し出された。',v:0,s:10},{text:'誰かの祈りが届いた。',v:15,s:0}];
const tanbaEvents = [
  {line:'来世を信じるも信じないも、あなた次第だ。',apply:s=>s.virtue+=30},
  {line:'心の準備はいいですか？',apply:s=>s.sin+=30},
  {line:'生きるとは、サイコロを振ることなのです。',apply:s=>{[s.virtue,s.sin]=[s.sin,s.virtue]}},
  {line:'徳も罪も、裏返せば同じ紙の表と裏。',apply:s=>{s.virtue=0;s.sin=0}},
  {line:'あなたの旅路、少しだけ見えました。',apply:s=>s.nextRollFixed=6},
  {line:'3マス進みなさい。',apply:s=>s.pendingMove=3},
  {line:'3マス戻りなさい。',apply:s=>s.pendingMove=-3},
  {line:'現世の始まりへ戻る。',apply:s=>{if(s.chapter==='現世編')s.position=0}},
  {line:'死後の世界では祝福が強い。',apply:s=>{if(s.chapter==='死後の世界編')s.pendingMove=5}}
];
const gameState = {chapter:'現世編',lifeStageIndex:0,currentCreature:{name:'',icon:'❔'},worldName:'現世',position:0,turn:0,diceResult:0,virtue:0,sin:0,nextRollFixed:null,pendingMove:0,isMoving:false,gameCleared:false};
const statusEl=document.getElementById('status'),boardEl=document.getElementById('board'),logEl=document.getElementById('log');

function initGame(){const saved=JSON.parse(localStorage.getItem('tanbaGame')||'null');if(saved){Object.assign(gameState,saved);render();if(gameState.currentCreature.name==='')showCreatureSelect(gameState.lifeStageIndex);}else{showStartScreen();}}
function showStartScreen(){document.getElementById('startScreen').classList.add('show');}
function showCreatureSelect(stageIndex){if(stageIndex>=5){gameState.currentCreature={name:'人間',icon:'🧍'};startLivingStage();return;}const stage=lifeStages[stageIndex];const wrap=document.getElementById('creatureList');wrap.innerHTML='';document.getElementById('creatureStage').textContent=stage;creatureOptions[stage].forEach(c=>{const b=document.createElement('button');b.className='creatureBtn';b.textContent=`${c.icon} ${c.name}`;b.onclick=()=>selectCreature(c);wrap.appendChild(b);});document.getElementById('creatureScreen').classList.add('show');}
function selectCreature(creature){gameState.currentCreature=creature;document.getElementById('creatureScreen').classList.remove('show');startLivingStage();}
function startLivingStage(){gameState.chapter='現世編';gameState.worldName='現世';gameState.position=0;saveRecords();render();}
function render(){renderStatus();renderBoard();saveRecords();}
function renderStatus(){statusEl.innerHTML=`<div>現在の章: <b>${gameState.chapter}</b></div><div>現在の生命ランク: <b>${lifeStages[gameState.lifeStageIndex]}</b></div><div>現在の生き物名: <b>${gameState.currentCreature.name}</b></div><div>現在の世界: <b>${gameState.worldName}</b></div><div>徳ポイント: <b>${gameState.virtue}</b></div><div>罪ポイント: <b>${gameState.sin}</b></div><div>ターン数: <b>${gameState.turn}</b></div><div>サイコロ結果: <b>${gameState.diceResult||'-'}</b></div><div>現世進化段階: <b>${Math.min(gameState.lifeStageIndex+1,6)} / 6</b></div><div>死後の進行度: <b>${gameState.chapter==='死後の世界編'?`${gameState.position} / ${afterlifeBoard.length-1}`:'-'} </b></div>`;
  const bar=document.getElementById('progressBar');bar.innerHTML='';lifeStages.forEach((s,i)=>{const chip=document.createElement('span');chip.className='stageChip'+(i===gameState.lifeStageIndex&&gameState.chapter==='現世編'?' active':'');chip.textContent=s;bar.appendChild(chip);});}
function renderBoard(){boardEl.innerHTML='';const data=gameState.chapter==='現世編'?livingWorldBoard:afterlifeBoard;const cols=6;data.forEach((sq,i)=>{const row=Math.floor(i/cols);const col=row%2===0?i%cols:cols-1-(i%cols);const cell=document.createElement('div');cell.className=`cell ${sq.type}`;cell.style.left=`${10+col*66}px`;cell.style.top=`${12+row*52}px`;cell.innerHTML=`<span class='tag'>${i}</span><span>${sq.label}</span>`;if(i===gameState.position)cell.innerHTML+=`<span class='player'>${gameState.currentCreature.icon}</span>`;boardEl.appendChild(cell);});}
async function rollDice(){if(gameState.isMoving||gameState.gameCleared) return;gameState.isMoving=true;gameState.turn++;await animateDice();const result=gameState.nextRollFixed||Math.floor(Math.random()*6)+1;gameState.nextRollFixed=null;gameState.diceResult=result;await movePlayer(result);}
function animateDice(){return new Promise(r=>setTimeout(r,380));}
async function movePlayer(step){const boardMax=(gameState.chapter==='現世編'?livingWorldBoard:afterlifeBoard).length-1;for(let i=0;i<step;i++){await new Promise(rs=>setTimeout(rs,120));gameState.position=Math.min(gameState.position+1,boardMax);render();if(gameState.position===boardMax)break;}await handleSquare();}
async function handleSquare(){const board=gameState.chapter==='現世編'?livingWorldBoard:afterlifeBoard;const sq=board[gameState.position];if(sq.type==='goal'){if(gameState.chapter==='現世編')await handleLivingGoal();else await handleAfterlifeGoal();gameState.isMoving=false;return;}if(sq.type==='event'){if(gameState.chapter==='現世編'){const card=pick(eventCards[lifeStages[gameState.lifeStageIndex]]);showEventCard('現世イベント',`${card.text} 徳+${card.v} 罪+${card.s}`);updateKarma(card.v,card.s);}else{const card=pick(afterlifeEvents);if(card.branch){const success=(gameState.virtue>=gameState.sin)||Math.random()>0.45;showEventCard('死後イベント',card.text+(success?' 成功。徳 +15':' 失敗。罪 +10'));updateKarma(success?15:0, success?0:10);}else{showEventCard('死後イベント',`${card.text} 徳+${card.v} 罪+${card.s}`);updateKarma(card.v,card.s);}}}
if(sq.type==='fate'){updateKarma(Math.floor(Math.random()*5),Math.floor(Math.random()*5));showEventCard('運命マス','徳と罪がゆらいだ。');}
if(sq.type==='tanba' || Math.random()<0.08){await showTanbaEvent();}
if(gameState.pendingMove!==0){const delta=gameState.pendingMove;gameState.pendingMove=0;gameState.position=Math.max(0,Math.min(gameState.position+delta,(gameState.chapter==='現世編'?livingWorldBoard:afterlifeBoard).length-1));appendLog(`丹波の余波で${delta>0?delta+'マス進んだ':Math.abs(delta)+'マス戻った'}。`);}render();gameState.isMoving=false;}
async function handleLivingGoal(){if(gameState.lifeStageIndex<5){showEventCard('転生','次の生命へ進む…');await advanceLifeStage();}else{showEventCard('現世ゴール','あなたは人間として現世を生き抜いた。');await enterAfterlife();}}
async function advanceLifeStage(){gameState.lifeStageIndex++;if(gameState.lifeStageIndex>=5){gameState.currentCreature={name:'人間',icon:'🧍'};startLivingStage();}else{showCreatureSelect(gameState.lifeStageIndex);}}
async function enterAfterlife(){await showReverseEffect();gameState.chapter='死後の世界編';gameState.worldName='死後の世界';gameState.position=0;document.body.classList.add('afterlife');render();}
function handleAfterlifeGoal(){const diff=gameState.virtue-gameState.sin;let ending='幽界さまよいエンド';if(diff>=100) ending='神界エンド'; else if(diff>=50) ending='天界エンド'; else if(gameState.virtue>=gameState.sin) ending='人間界見守りエンド'; else if(gameState.sin-gameState.virtue>=100) ending='地獄一界層エンド';showEventCard('CONGRATULATION',`あなたは死後の旅路を越えた。\n${ending}`);gameState.gameCleared=true;}
function showEventCard(title,text){document.getElementById('eventTitle').textContent=title;document.getElementById('eventText').textContent=text;document.getElementById('eventModal').classList.add('show');appendLog(`${title}: ${text}`);}
async function showTanbaEvent(){const e=pick(tanbaEvents);document.getElementById('tanbaText').textContent=e.line;document.getElementById('tanbaModal').classList.add('show');e.apply(gameState);appendLog(`丹波: ${e.line}`);await new Promise(r=>setTimeout(r,1200));document.getElementById('tanbaModal').classList.remove('show');}
function updateKarma(v,s){gameState.virtue=Math.max(0,gameState.virtue+v);gameState.sin=Math.max(0,gameState.sin+s);}
function showReverseEffect(){return new Promise(r=>{const fx=document.getElementById('reverseFx');fx.classList.add('show');setTimeout(()=>{fx.classList.remove('show');r();},900);});}
function saveRecords(){localStorage.setItem('tanbaGame',JSON.stringify(gameState));}
function restartGame(){localStorage.removeItem('tanbaGame');Object.assign(gameState,{chapter:'現世編',lifeStageIndex:0,currentCreature:{name:'',icon:'❔'},worldName:'現世',position:0,turn:0,diceResult:0,virtue:0,sin:0,nextRollFixed:null,pendingMove:0,isMoving:false,gameCleared:false});document.body.classList.remove('afterlife');showCreatureSelect(0);render();}
function appendLog(t){logEl.textContent=`${t}\n`+logEl.textContent;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

document.getElementById('startBtn').onclick=()=>{document.getElementById('startScreen').classList.remove('show');showCreatureSelect(0);render();};
document.getElementById('rollBtn').onclick=rollDice;
document.getElementById('restartBtn').onclick=restartGame;
document.getElementById('eventClose').onclick=()=>{document.getElementById('eventModal').classList.remove('show');render();};
initGame();
</script>
</body>
</html>
