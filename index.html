<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>輪廻転生リバーシブルゲーム たんば</title>
<style>
:root{--bg:#06040f;--panel:#120f24;--neon:#46f4ff;--txt:#f7f7ff;--good:#4dff93;--great:#ffd44a;--sin:#8d4bff;--greatsin:#ff4848;--fate:#3fa7ff;--tanba:#fff3b0;--stop:#0d0d0d;--warp:#3ffff2;--back:#ff9f3f;--goal:linear-gradient(135deg,#ff4040,#ffd84c)}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 18% 0,#2a1b63,#06040f 50%);color:var(--txt);font-family:monospace;overflow-x:hidden;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
body.afterlife{background:radial-gradient(circle at 50% 0,#5a053f,#160013 45%,#020005)}
.app{max-width:430px;margin:0 auto;min-height:100vh;padding:8px 8px 96px}.panel{background:var(--panel);border:2px solid var(--neon);border-radius:10px;padding:8px;box-shadow:0 0 16px #39edff44}
h1{margin:0 0 6px;font-size:16px;color:#ffe0ff;text-shadow:0 0 8px #ff36d5}.status{display:grid;grid-template-columns:1fr 1fr;gap:5px;font-size:12px}.status b{color:#87ffcd}
#boardArea{margin-top:8px;border:2px solid #fff;border-radius:12px;height:520px;position:relative;overflow:hidden;background:radial-gradient(circle,#fff2 1px,transparent 1px) 0 0/8px 8px,linear-gradient(#101a47,#0a0d2a 50%,#080711)}
body.afterlife #boardArea{background:linear-gradient(180deg,#250018,#3d0027 28%,#0b091f 54%,#0e3b66 86%,#f4e8bd)}
#livingBoard,#afterlifeBoard{position:absolute;inset:0}.ring{position:absolute;border:1px solid #fff4;border-radius:50%;left:50%;top:50%;transform:translate(-50%,-50%)}
.centerGoal{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:92px;height:92px;border-radius:50%;display:flex;align-items:center;justify-content:center;text-align:center;font-size:14px;font-weight:700;background:var(--goal);color:#200;box-shadow:0 0 14px #ffda55}
.cell{position:absolute;width:28px;height:28px;border:1px solid #000;border-radius:7px;font-size:8px;display:flex;align-items:center;justify-content:center;color:#000;box-shadow:0 0 0 1px #fff3 inset}
.cell.good{background:var(--good)}.cell.great{background:var(--great)}.cell.sin{background:var(--sin);color:#fff}.cell.greatsin{background:var(--greatsin);color:#fff}.cell.fate{background:var(--fate)}.cell.tanba{background:linear-gradient(135deg,#fff,#f0ca61)}.cell.stop{background:var(--stop);color:#fff}.cell.warp{background:var(--warp)}.cell.back{background:var(--back)}.cell.goal{background:var(--goal)}
.cell.active{outline:2px solid #fff;transform:scale(1.2);z-index:5;box-shadow:0 0 12px #fff}.player{position:absolute;font-size:16px;animation:hop .35s infinite alternate}@keyframes hop{to{transform:translateY(-2px)}}
.afterGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:8px}
.afterCell{min-height:40px;border:1px solid #fff4;border-radius:8px;position:relative;display:flex;align-items:center;justify-content:center;font-size:10px}
.afterCell.active{box-shadow:0 0 12px #fff;border-color:#fff}
.actionsFixed{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:min(430px,100%);display:grid;grid-template-columns:2fr 1fr;gap:8px;padding:8px;border-top:2px solid var(--neon);background:#060b14eb;z-index:60}
button{min-height:44px;border:0;border-radius:10px;font-family:inherit;font-size:15px;font-weight:700}#rollBtn{background:linear-gradient(135deg,#ff2acd,#6b6dff);color:#fff;box-shadow:0 0 12px #ff3fd7}#rollBtn:active{filter:brightness(1.35)}#restartBtn{background:#3ab2ff;color:#04182f}
#log{margin-top:8px;max-height:128px;overflow:auto;font-size:12px;white-space:pre-wrap}
.overlay,.modal,.diceOverlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:12px;z-index:80}.show{display:flex}.overlay,.modal,.diceOverlay{background:#000c}
.box{width:100%;max-width:390px;background:#0b0e1d;border:2px solid var(--neon);border-radius:12px;padding:12px}
.selectGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}.sel{background:#21103f;color:#fff;border:1px solid #7ce9ff}
#tanbaSil{width:120px;height:165px;margin:0 auto 10px;background:#000;border-radius:56% 56% 40% 40%;position:relative;box-shadow:0 0 28px #ffe57b}#tanbaSil:before{content:"";position:absolute;width:66px;height:66px;border-radius:50%;background:#000;left:27px;top:-34px}
.reverseFx{animation:rev .9s}@keyframes rev{0%{filter:invert(0)}45%{filter:invert(1) hue-rotate(180deg)}100%{filter:invert(0)}}
.diceWindow{width:180px;height:180px;border:3px solid #fff;border-radius:24px;background:radial-gradient(circle,#fff,#d8e4ff);display:grid;place-items:center;position:relative;animation:shake .08s infinite;filter:drop-shadow(0 0 18px #ff4cdc)}@keyframes shake{50%{transform:rotate(8deg) scale(.94)}}
.diceWindow.stop{animation:none;transform:scale(1.07);box-shadow:0 0 24px #fff,0 0 34px #ffef85}
.dicePips{width:120px;height:120px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.pip{width:20px;height:20px;border-radius:50%;background:#27304f;opacity:0}.pip.on{opacity:1}
.flash{position:absolute;inset:-20px;border-radius:26px;pointer-events:none;animation:flash .45s}.flash:before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,#ffffff35 0 2px,#0000 2px 6px)}@keyframes flash{from{opacity:1}to{opacity:0}}
</style>
</head><body>
<div class="app">
<section class="panel"><h1>輪廻転生リバーシブルゲーム たんば</h1><div id="status" class="status"></div></section>
<section id="boardArea"><div id="livingBoard"></div><div id="afterlifeBoard" style="display:none"></div></section>
<section class="panel"><div id="log"></div></section>
</div>
<div class="actionsFixed"><button id="rollBtn">🎲 サイコロを振る</button><button id="restartBtn">⟲ リスタート</button></div>
<div class="overlay show" id="startScreen"><div class="box"><h2>START</h2><p>外周から内周へ、命を重ねる同心円すごろく。</p><button id="startBtn">現世を始める</button></div></div>
<div class="overlay" id="creatureScreen"><div class="box"><h3>次の生命を選べ</h3><p id="laneLabel"></p><div id="creatureChoices" class="selectGrid"></div></div></div>
<div class="modal" id="eventModal"><div class="box"><h3 id="eventTitle"></h3><p id="eventText"></p><button id="eventClose">閉じる</button></div></div>
<div class="modal" id="tanbaModal"><div class="box"><div id="tanbaSil"></div><h3>丹波イベント</h3><p id="tanbaText"></p></div></div>
<div class="overlay" id="fxOverlay"><div class="box" id="fxText"></div></div>
<div class="diceOverlay" id="diceOverlay"><div class="diceWindow" id="diceWindow"><div class="dicePips" id="dicePips"></div></div></div>
<script>
const lifeLanes=[{name:'地を這うもの',count:28,radius:186},{name:'水に住むもの',count:24,radius:150},{name:'空を飛ぶもの',count:20,radius:118},{name:'陸に住むもの / 哺乳類',count:16,radius:88},{name:'人間',count:10,radius:58}];
const creatureOptions={
'地を這うもの':[{name:'ナマコ',icon:'〰️'},{name:'ゲジゲジ',icon:'🐛'},{name:'ミミズ',icon:'🪱'},{name:'ダンゴムシ',icon:'⚫'},{name:'ヤスデ',icon:'🐛'}],
'水に住むもの':[{name:'フナ',icon:'🐟'},{name:'ミジンコ',icon:'·'},{name:'メダカ',icon:'🐠'},{name:'クラゲ',icon:'🪼'},{name:'ザリガニ',icon:'🦐'}],
'空を飛ぶもの':[{name:'スズメ',icon:'🐦'},{name:'カラス',icon:'🐦‍⬛'},{name:'ハト',icon:'🕊️'},{name:'チョウ',icon:'🦋'},{name:'トンボ',icon:'✢'}],
'陸に住むもの / 哺乳類':[{name:'犬',icon:'🐕'},{name:'猫',icon:'🐈'},{name:'猿',icon:'🐒'},{name:'馬',icon:'🐎'},{name:'キツネ',icon:'🦊'}]
};
const squareTypes=['good','great','sin','greatsin','fate','tanba','stop','warp','back','goal'];
const livingCircleBoard=lifeLanes.map((lane,idx)=>Array.from({length:lane.count},(_,i)=>({label:i, type: pickType(i,lane.count,idx)})));
function pickType(i,len,idx){if(i===len-1)return 'goal';const p=i%9;return ['good','sin','fate','tanba','great','greatsin','stop','warp','back'][p];}
const afterlifeBoard=Array.from({length:50},(_,i)=>({name:['地獄','一界層','二界層','罪の谷','三途の川','幽界','精霊界','霊界','回想','天界','天の村','神界','光の門'][i%13],type:i===49?'goal':squareTypes[i%9]}));
const eventCards={
'地を這うもの':[['靴音を察知して全力で横に逃げた。',5,0],['乾いた地面で人生を考えた。',0,3],['落ち葉の裏で一晩を越した。',4,0],['なぜか人間に悲鳴を上げられた。',0,5],['石の下で小さな宇宙を見た。',6,0]],
'水に住むもの':[['水面の光を見上げて、少し悟った。',6,0],['大きな魚の影におびえた。',0,4],['透明な水草に隠れて命をつないだ。',5,0],['泡を出しただけで一日が終わった。',0,2],['流れに逆らわず、流れそのものになった。',8,0]],
'空を飛ぶもの':[['電線から夕焼けを見た。',8,0],['風を読んで空を渡った。',7,0],['人の弁当を狙った。',0,8],['窓ガラスに映る自分を敵だと思った。',0,6],['雲の切れ間に前世を見た。',10,0]],
'陸に住むもの / 哺乳類':[['子どもに撫でられて優しい気持ちになった。',10,0],['群れの仲間を守った。',12,0],['エサを独り占めした。',0,10],['何もしていないのに偉そうに座った。',0,5],['月を見上げて遠吠えした。',7,0]],
'人間':[['落ちていた財布を交番に届けた。',15,0],['電車で席を譲った。',10,0],['ありがとうと言うタイミングを逃した。',0,5],['人の話を聞いているふりをした。',0,8],['まだ読んでいない本を読んだ顔で語った。',0,10],['誰も見ていないところでゴミを拾った。',12,0],['怒りを飲み込み、静かに水を飲んだ。',8,0]]
};
const afterlifeEvents=[['三途の川で順番待ちをした。',5,0],['霊界の受付で書類不備を指摘された。',0,8],['精霊界でダンス審査が始まった。',15,10,true],['前世の記憶が水面に映った。',10,0],['地獄の一丁目で道に迷った。',0,15],['天界の村でお茶を出された。',20,0],['生前の発言が霊界スクリーンに映し出された。',0,10],['誰かの祈りが届いた。',15,0],['地獄の門番に妙に親切にされた。',5,0],['天へ向かう階段で一段だけ踏み外した。',0,6],['神界の前で急に言い訳を始めた。',0,12],['光の門の前で深く頭を下げた。',20,0]];
const tanbaEvents=[
['来世を信じるも信じないも、あなた次第だ。',s=>s.virtue+=30],['心の準備はいいですか？',s=>s.sin+=30],['生きるとは、サイコロを振ることなのです。',s=>{[s.virtue,s.sin]=[s.sin,s.virtue]}],['徳も罪も、裏返せば同じ紙の表と裏。',s=>{s.virtue=0;s.sin=0}],['あなたの旅路、少しだけ見えました。',s=>s.fixedDice=6],['輪廻の円は、外から内へ回るのです。',s=>s.pendingMove=3],['三マス戻って、己を見つめよ。',s=>s.pendingMove=-3],['現レーンの始まりに戻る。',s=>{if(s.chapter==='現世')s.lanePos=0}],['死後では五マス進みなさい。',s=>{if(s.chapter==='死後の世界')s.pendingMove=5}]
];
const gameState={chapter:'現世',laneIndex:0,lanePos:0,currentCreature:{name:'',icon:'❔'},afterPos:0,virtue:0,sin:0,turn:0,dice:0,fixedDice:null,pendingMove:0,moving:false,cleared:false};
const statusEl=document.getElementById('status'),livingEl=document.getElementById('livingBoard'),afterEl=document.getElementById('afterlifeBoard'),logEl=document.getElementById('log');
function initGame(){const s=JSON.parse(localStorage.getItem('tanbaSave')||'null');if(s){Object.assign(gameState,s);render();if(!gameState.currentCreature.name&&gameState.laneIndex<4)showCreatureSelect(gameState.laneIndex);}else showStartScreen();}
function showStartScreen(){document.getElementById('startScreen').classList.add('show');}
function showCreatureSelect(laneIndex){const lane=lifeLanes[laneIndex].name;const c=document.getElementById('creatureChoices');c.innerHTML='';document.getElementById('laneLabel').textContent=lane;(creatureOptions[lane]||[]).forEach(cre=>{const b=document.createElement('button');b.className='sel';b.textContent=`${cre.icon} ${cre.name}`;b.onclick=()=>selectCreature(cre);c.appendChild(b);});document.getElementById('creatureScreen').classList.add('show');}
function selectCreature(creature){gameState.currentCreature=creature;document.getElementById('creatureScreen').classList.remove('show');startLane(gameState.laneIndex);}
function startLane(laneIndex){gameState.chapter='現世';gameState.laneIndex=laneIndex;gameState.lanePos=0;render();saveRecords();}
function render(){renderStatus();if(gameState.chapter==='現世')renderLivingCircleBoard();else renderAfterlifeBoard();saveRecords();}
function renderStatus(){statusEl.innerHTML=`<div>現在の章: <b>${gameState.chapter}</b></div><div>生命レーン: <b>${lifeLanes[Math.min(gameState.laneIndex,4)].name}</b></div><div>生き物: <b>${gameState.currentCreature.icon} ${gameState.currentCreature.name||'未選択'}</b></div><div>徳: <b>${gameState.virtue}</b></div><div>罪: <b>${gameState.sin}</b></div><div>ターン: <b>${gameState.turn}</b></div><div>サイコロ: <b>${gameState.dice||'-'}</b></div><div>現在位置: <b>${gameState.chapter==='現世'?`${gameState.lanePos}/${lifeLanes[gameState.laneIndex].count-1}`:`${gameState.afterPos}/${afterlifeBoard.length-1}`}</b></div><div>現世進行: <b>${lifeLanes.map((l,i)=>i===gameState.laneIndex?'●':'○').join('→')}</b></div><div>死後進行: <b>地獄 → 天</b></div>`}
function renderLivingCircleBoard(){document.body.classList.remove('afterlife');livingEl.style.display='block';afterEl.style.display='none';livingEl.innerHTML='';lifeLanes.forEach((lane,i)=>{const ring=document.createElement('div');ring.className='ring';ring.style.width=`${lane.radius*2+40}px`;ring.style.height=`${lane.radius*2+40}px`;livingEl.appendChild(ring);livingCircleBoard[i].forEach((sq,idx)=>{const a=(Math.PI*2)*(idx/lane.count)-Math.PI/2;const x=215+Math.cos(a)*lane.radius;const y=260+Math.sin(a)*lane.radius;const d=document.createElement('div');d.className=`cell ${sq.type}`;d.style.left=(x-14)+'px';d.style.top=(y-14)+'px';if(i===gameState.laneIndex&&idx===gameState.lanePos)d.classList.add('active');d.textContent=sq.type==='goal'?'G':'';if(i===gameState.laneIndex&&idx===gameState.lanePos){const p=document.createElement('div');p.className='player';p.textContent=gameState.currentCreature.icon;d.appendChild(p);}livingEl.appendChild(d);});});livingEl.innerHTML+='<div class="centerGoal">人間<br>GOAL</div>'}
function renderAfterlifeBoard(){document.body.classList.add('afterlife');livingEl.style.display='none';afterEl.style.display='block';afterEl.innerHTML='<div class="afterGrid" id="afterGrid"></div>';const g=document.getElementById('afterGrid');afterlifeBoard.forEach((sq,i)=>{const d=document.createElement('div');d.className=`afterCell cell ${sq.type}${i===gameState.afterPos?' active':''}`;d.textContent=i===afterlifeBoard.length-1?'神界GOAL':sq.name;if(i===gameState.afterPos)d.innerHTML+=`<div class='player'>🧍</div>`;g.appendChild(d);});}
async function rollDice(){if(gameState.moving||gameState.cleared)return;gameState.moving=true;gameState.turn++;const v=await animateDice();gameState.dice=v;await movePlayerStepByStep(v)}
function animateDice(){return new Promise(res=>{const ov=document.getElementById('diceOverlay'),win=document.getElementById('diceWindow');ov.classList.add('show');win.classList.remove('stop');let c=0,val=1;const iv=setInterval(()=>{val=1+Math.floor(Math.random()*6);renderDiceFace(val);if(++c>18){clearInterval(iv);const final=gameState.fixedDice||val;gameState.fixedDice=null;renderDiceFace(final);win.classList.add('stop');const fl=document.createElement('div');fl.className='flash';win.appendChild(fl);setTimeout(()=>{fl.remove();ov.classList.remove('show');res(final);},420)}},55)})}
function renderDiceFace(number){const p=document.getElementById('dicePips');p.innerHTML='';for(let i=0;i<9;i++){const s=document.createElement('div');s.className='pip';p.appendChild(s);}const on=(idx)=>p.children[idx].classList.add('on');({1:[4],2:[0,8],3:[0,4,8],4:[0,2,6,8],5:[0,2,4,6,8],6:[0,2,3,5,6,8]})[number].forEach(on)}
async function movePlayerStepByStep(steps){for(let i=0;i<steps;i++){await new Promise(r=>setTimeout(r,130));if(gameState.chapter==='現世'){gameState.lanePos++;if(gameState.lanePos>=lifeLanes[gameState.laneIndex].count){await handleLaneComplete();if(gameState.chapter!=='現世')break;}}else{gameState.afterPos=Math.min(afterlifeBoard.length-1,gameState.afterPos+1)}render();beep(250+i*30,0.03)}await handleSquare();gameState.moving=false}
async function handleSquare(){if(gameState.chapter==='現世'){const sq=livingCircleBoard[gameState.laneIndex][Math.min(gameState.lanePos,lifeLanes[gameState.laneIndex].count-1)];if(!sq)return;applySquare(sq.type);}else{const sq=afterlifeBoard[gameState.afterPos];applySquare(sq.type);if(gameState.afterPos===afterlifeBoard.length-1){handleAfterlifeGoal();return;}}
if(gameState.pendingMove){const mv=gameState.pendingMove;gameState.pendingMove=0;if(gameState.chapter==='現世')gameState.lanePos=Math.max(0,Math.min(gameState.lanePos+mv,lifeLanes[gameState.laneIndex].count-1));else gameState.afterPos=Math.max(0,Math.min(gameState.afterPos+mv,afterlifeBoard.length-1));appendLog(`追加移動: ${mv}`)}render()}
function applySquare(type){if(type==='good')return showEventCard('徳','徳 +8'),updateKarma(8,0);if(type==='great')return showEventCard('大徳','徳 +15'),updateKarma(15,0);if(type==='sin')return showEventCard('罪','罪 +8'),updateKarma(0,8);if(type==='greatsin')return showEventCard('大罪','罪 +15'),updateKarma(0,15);if(type==='fate'){const v=Math.floor(Math.random()*6),s=Math.floor(Math.random()*6);showEventCard('運命',`徳+${v} / 罪+${s}`);updateKarma(v,s);}
if(type==='stop'){showEventCard('停止','このターンは静止した。')}
if(type==='warp'){gameState.pendingMove+=2;showEventCard('ワープ','次に2マス進む。')}
if(type==='back'){gameState.pendingMove-=2;showEventCard('戻る','次に2マス戻る。')}
if(type==='tanba'||Math.random()<0.07)showTanbaEvent();
if(type==='goal'&&gameState.chapter==='現世'&&gameState.laneIndex===4)enterAfterlife();
if(type==='goal'&&gameState.chapter==='死後の世界')handleAfterlifeGoal();
const lane=lifeLanes[Math.min(gameState.laneIndex,4)].name;if(gameState.chapter==='現世'){const [txt,v,s]=pick(eventCards[lane]);showEventCard(`${gameState.currentCreature.name}の記憶`,`${txt} 徳+${v} 罪+${s}`);updateKarma(v,s);}else{const ev=pick(afterlifeEvents);if(ev[3]){const ok=gameState.virtue>=gameState.sin||Math.random()>.45;showEventCard('死後イベント',ev[0]+(ok?' 成功。徳+15':' 失敗。罪+10'));updateKarma(ok?15:0,ok?0:10)}else{showEventCard('死後イベント',`${ev[0]} 徳+${ev[1]} 罪+${ev[2]}`);updateKarma(ev[1],ev[2]);}}
}
async function handleLaneComplete(){await showLaneClearEffect();if(gameState.laneIndex<3){moveToInnerLane();}else if(gameState.laneIndex===3){becomeHuman();}else if(gameState.laneIndex===4){gameState.lanePos=lifeLanes[4].count-1;}}
function moveToInnerLane(){gameState.laneIndex++;gameState.lanePos=0;showCreatureSelect(gameState.laneIndex)}
function becomeHuman(){gameState.laneIndex=4;gameState.currentCreature={name:'人間',icon:'🧍'};gameState.lanePos=0;showEventCard('人間界の門','ついに人間界の門が開く。')}
async function enterAfterlife(){showEventCard('現世ゴール','あなたは人間として現世を生き抜いた。');await showReverseEffect();gameState.chapter='死後の世界';gameState.afterPos=0;render()}
function handleAfterlifeGoal(){showEnding();gameState.cleared=true}
function showEventCard(title,text){document.getElementById('eventTitle').textContent=title;document.getElementById('eventText').textContent=text;document.getElementById('eventModal').classList.add('show');appendLog(`${title}: ${text}`)}
function showTanbaEvent(){const e=pick(tanbaEvents);document.getElementById('tanbaText').textContent=e[0];document.getElementById('tanbaModal').classList.add('show');e[1](gameState);appendLog(`丹波: ${e[0]}`);setTimeout(()=>document.getElementById('tanbaModal').classList.remove('show'),1100)}
function updateKarma(v,s){gameState.virtue=Math.max(0,gameState.virtue+v);gameState.sin=Math.max(0,gameState.sin+s)}
function showReverseEffect(){return new Promise(r=>{const o=document.getElementById('fxOverlay'),t=document.getElementById('fxText');t.className='box reverseFx';t.innerHTML='<h3>肉体の旅は終わった</h3><p>ここから先は、死後の世界である</p>';o.classList.add('show');setTimeout(()=>{o.classList.remove('show');r()},900)})}
function showLaneClearEffect(){return new Promise(r=>{const o=document.getElementById('fxOverlay'),t=document.getElementById('fxText');const m=[['地を這うものとして、一つの生を終えた','次なる命は、水に揺れる'],['水底の記憶を抱えたまま、次の生へ','空を見上げる命へ進化する'],['風を越え、空の生を終えた','次は地上を歩む命へ'],['体温を持つ命として、生を駆け抜けた','ついに人間界の門が開く']][Math.min(gameState.laneIndex,3)];t.className='box';t.innerHTML=`<h3>転生</h3><p>${m[0]}<br>${m[1]}</p>`;o.classList.add('show');setTimeout(()=>{o.classList.remove('show');r()},1100)})}
function showEnding(){const d=gameState.virtue-gameState.sin;let e='幽界さまよいエンド';if(d>=100)e='神界エンド';else if(d>=50)e='天界エンド';else if(gameState.virtue>=gameState.sin)e='人間界見守りエンド';else if(gameState.sin-gameState.virtue>=100)e='地獄一界層エンド';showEventCard('CONGRATULATION',`あなたは死後の旅路を越えた。\n${e}`)}
function saveRecords(){localStorage.setItem('tanbaSave',JSON.stringify(gameState))}
function restartGame(){localStorage.removeItem('tanbaSave');Object.assign(gameState,{chapter:'現世',laneIndex:0,lanePos:0,currentCreature:{name:'',icon:'❔'},afterPos:0,virtue:0,sin:0,turn:0,dice:0,fixedDice:null,pendingMove:0,moving:false,cleared:false});document.body.classList.remove('afterlife');showCreatureSelect(0);render()}
function pick(a){return a[Math.floor(Math.random()*a.length)]}
function appendLog(t){logEl.textContent=t+'\n'+logEl.textContent}
function beep(f=440,d=0.05){try{const ac=new(window.AudioContext||window.webkitAudioContext)(),o=ac.createOscillator(),g=ac.createGain();o.frequency.value=f;o.type='square';o.connect(g);g.connect(ac.destination);o.start();g.gain.setValueAtTime(0.05,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+d);o.stop(ac.currentTime+d)}catch(e){}}

document.getElementById('startBtn').onclick=()=>{document.getElementById('startScreen').classList.remove('show');showCreatureSelect(0);render()};
document.getElementById('rollBtn').onclick=rollDice;document.getElementById('restartBtn').onclick=restartGame;document.getElementById('eventClose').onclick=()=>document.getElementById('eventModal').classList.remove('show');
initGame();
</script></body></html>
